name: iOS Debug Build (No Signing)\n\non:\n  push:\n    branches:\n      - refactor/ios27-optimization\n      - main\n      - develop\n  workflow_dispatch:\n\njobs:\n  build:\n    runs-on: macos-latest\n    \n    steps:\n      - name: Checkout Code\n        uses: actions/checkout@v4\n      \n      - name: Setup Node.js\n        uses: actions/setup-node@v4\n        with:\n          node-version: '18.x'\n          cache: 'npm'\n      \n      - name: Install Dependencies\n        run: npm install\n      \n      - name: Install Expo CLI\n        run: npm install -g expo-cli\n      \n      - name: Setup Ruby\n        uses: ruby/setup-ruby@v1\n        with:\n          ruby-version: '3.2'\n          bundler-cache: true\n      \n      - name: Setup Cocoapods\n        run: |\n          gem install cocoapods\n          pod repo update\n      \n      - name: Generate Native Project\n        run: npm run prebuild -- --clean\n      \n      - name: Install iOS Dependencies\n        run: |\n          cd ios\n          pod install --repo-update\n          cd ..\n      \n      - name: Build iOS (Debug, No Signing)\n        run: |\n          cd ios\n          xcodebuild \\\n            -workspace ZhihuMinusMinus.xcworkspace \\\n            -scheme ZhihuMinusMinus \\\n            -configuration Debug \\\n            -derivedDataPath build \\\n            -sdk iphonesimulator \\\n            -arch x86_64 \\\n            CODE_SIGN_IDENTITY=\"\" \\\n            CODE_SIGNING_REQUIRED=NO \\\n            CODE_SIGN_ENTITLEMENTS=\"\" \\\n            build\n          cd ..\n      \n      - name: Create IPA (Simulator)\n        run: |\n          mkdir -p build_output\n          cd ios/build/Build/Products/Debug-iphonesimulator\n          zip -r ../../../ZhihuMinusMinus.zip ZhihuMinusMinus.app\n          mv ../../../ZhihuMinusMinus.zip ../../../../../build_output/\n          cd ../../../../..\n      \n      - name: Upload Build Artifacts\n        uses: actions/upload-artifact@v3\n        with:\n          name: ios-debug-build\n          path: build_output/\n          retention-days: 30\n      \n      - name: Create Release\n        uses: actions/create-release@v1\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n        with:\n          tag_name: ios-debug-${{ github.run_number }}\n          release_name: iOS Debug Build #${{ github.run_number }}\n          body: |\n            # iOS Debug Build\n            \n            **Build Info:**\n            - Platform: iOS Simulator\n            - Configuration: Debug\n            - Signing: None (Unsigned)\n            - Commit: ${{ github.sha }}\n            - Branch: ${{ github.ref }}\n            - Build #: ${{ github.run_number }}\n            \n            ## 📦 Artifacts\n            - `ZhihuMinusMinus.zip` - Simulator App Bundle\n            \n            ## 🚀 Usage\n            1. Download the artifact\n            2. Extract: `unzip ZhihuMinusMinus.zip`\n            3. Install to simulator: `xcrun simctl install booted ZhihuMinusMinus.app`\n            4. Launch: `xcrun simctl launch booted com.zhihu.minusminus`\n            \n            ## 📝 Notes\n            - This is an unsigned debug build\n            - Only works on iOS Simulator\n            - For real device testing, code signing is required\n          draft: false\n          prerelease: true\n      \n      - name: Build Success Notification\n        if: success()\n        run: |\n          echo \"✅ iOS Debug Build Completed Successfully!\"\n          echo \"Build artifacts available in Actions tab\"\n      \n      - name: Build Failure Notification\n        if: failure()\n        run: |\n          echo \"❌ iOS Debug Build Failed\"\n          echo \"Check workflow logs for details\"\n          exit 1\n"